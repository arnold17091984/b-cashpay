# B-CashPay Nginx Configuration
# API + Payment Page server
#
# Prerequisites:
#   - PHP-FPM running on unix socket
#   - SSL certificate (Let's Encrypt recommended)
#   - Scraper FastAPI server on port 8100

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.bcashpay.com pay.bcashpay.com;
    return 301 https://$host$request_uri;
}

# Main API + Payment Page
server {
    listen 443 ssl http2;
    server_name api.bcashpay.com pay.bcashpay.com;

    ssl_certificate     /etc/letsencrypt/live/bcashpay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bcashpay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /opt/bcashpay/api/public;
    index index.php;

    charset utf-8;
    client_max_body_size 2M;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Access and error logs
    access_log /var/log/nginx/bcashpay_access.log;
    error_log  /var/log/nginx/bcashpay_error.log;

    # API routes
    location /api/ {
        try_files $uri /index.php?$query_string;
    }

    # Payment page routes (customer-facing)
    location /p/ {
        try_files $uri /index.php?$query_string;
    }
    location /pay/ {
        try_files $uri /index.php?$query_string;
    }

    # Static assets for payment page
    location /assets/ {
        alias /opt/bcashpay/pay/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # Scraper control server proxy (internal only)
    location /scraper/ {
        # Restrict to localhost and internal IPs
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }

    # Health check
    location /health {
        try_files $uri /index.php?$query_string;
    }
}
