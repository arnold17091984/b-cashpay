<!DOCTYPE html>
<!--
  B-Pay — Payment Link Expired Page
  ========================================
  PHP placeholder replacements:
    {{REFERENCE_NUMBER}}  — 7-digit reference number
    {{EXPIRED_AT}}        — expiry datetime string
    {{SERVICE_NAME}}      — merchant name
    {{RETURN_URL}}        — URL back to merchant (may be empty)
    {{SUPPORT_EMAIL}}     — support contact email (may be empty)
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>お支払いリンクの有効期限切れ — B-Pay</title>

  <link rel="preconnect" href="https://rsms.me">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bcp-page--expired">

<main class="bcp-expired-page" aria-label="お支払いリンク期限切れ">
  <article class="bcp-expired-card">

    <!-- Brand -->
    <div class="bcp-expired-card__brand" aria-hidden="true">
      <span style="
        display:inline-flex;align-items:center;justify-content:center;
        width:18px;height:18px;border-radius:5px;
        background:linear-gradient(135deg,#10b981,#059669);
        box-shadow:0 2px 6px rgba(59,130,246,0.35);
      ">
        <svg viewBox="0 0 12 12" fill="none" width="10" height="10">
          <path d="M3 2h4a2 2 0 010 4H3V2zm0 4h4.5a2 2 0 010 4H3V6z" fill="#fff" fill-opacity="0.9"/>
        </svg>
      </span>
      B-Pay
    </div>

    <!-- Clock icon -->
    <div class="bcp-expired-card__icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9.5"/>
        <polyline points="12 6.5 12 12 15.5 14"/>
      </svg>
    </div>

    <h1 class="bcp-expired-card__title">お振込み期限を過ぎました</h1>

    <p class="bcp-expired-card__sub">
      このお支払いリンクは
      <strong style="color:var(--fg-1);">{{EXPIRED_AT}}</strong>
      に有効期限が切れました。<br><br>
      お支払いを続けるには、ご利用のサービスから新しいお支払いリンクを再発行してください。
    </p>

    <p class="bcp-expired-card__ref" aria-label="参照番号">
      参照番号: {{REFERENCE_NUMBER}}
    </p>

    <!-- No action buttons — a customer hitting this page has no useful
         navigation target (there is no merchant-side "back" for a plain
         B-Pay link), and the support-email flow is out of scope.  The
         copy above already tells the customer to request a new link
         from whoever sent them here. -->

    <!-- Footer -->
    <p style="margin-top:var(--sp-6);font-size:11px;color:var(--fg-3);text-align:center;">
      Powered by B-Pay
    </p>

  </article>
</main>

</body>
</html>
